      responses:
        200:
          description: "OK"
          content:
            application/json: {}
      security: []
  /api/v1/booths:
    post:
      summary: "Create new booth (createBooth)"
      description: "Returns **201** (Created) as **application/json**\n\n _app/controllers/booth_status_controller.ts_ - **createBooth**"
      parameters: []
      tags:
        - "BOOTHS"
      responses:
        201:
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  booth_id: "string"
                  booth_name: "string"
                  photo_key: "string|null"
                  photo_url: "string|null"
                  photo_miniature_url: "string|null"
                  localization: "string|null"
              example:
                booth_id: "string"
                booth_name: "string"
                photo_key: "string|null"
                photo_url: "string|null"
                photo_miniature_url: "string|null"
                localization: "string|null"
          description: "Returns **201** (Created) as **application/json**"
        401:
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  error: "string"
              example:
                error: "string"
          description: "Returns **401** (Unauthorized) as **application/json**"
        403:
          description: "Returns **403** (Forbidden)"
        409:
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  message: "string"
              example:
                message: "string"
          description: "Returns **409** (Conflict) as **application/json**"
        500:
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  message: "string"
                  error: "string"
              example:
                message: "string"
                error: "string"
          description: "Returns **500** (Internal Server Error) as **application/json**"
      security:
        - ApiKeyAuth:
            - "access"
      requestBody:
        content:
          application/json:
            schema:
              type: "object"
              properties:
                booth_id: "string"
                booth_name: "string"
                photo_key: "string?"
                localization: "string?"
            example:
              booth_id: "string"
              booth_name: "string"
              photo_key: "string?"
              localization: "string?"
  /api/v1/files/{key}:
    get:
      summary: " (get)"
      description: "\n\n _app/controllers/files_controller.ts_ - **get**"
      parameters:
        - in: "path"
          name: "key"
          schema:
            type: "string"
          required: true
      tags:
        - "FILES"
      responses:
        200:
          description: "OK"
          content:
            application/json: {}
      security: []
  /api/v1/files:
    post:
      summary: " (post)"
      description: "\n\n _app/controllers/files_controller.ts_ - **post**"
      parameters: []
      tags:
        - "FILES"
      responses:
        401:
          description: "Returns **401** (Unauthorized)"
        403:
          description: "Returns **403** (Forbidden)"
      security:
        - ApiKeyAuth:
            - "access"
      requestBody:
        content:
          application/json: {}
  /api/v1/booths/status:
    get:
      summary: "Get latest statuses for all booths (index)"
      description: "Returns **200** (OK) as **application/json**\n\n _app/controllers/booth_status_controller.ts_ - **index**"
      parameters: []
      tags:
        - "BOOTHS"
      responses:
        200:
          content:
            application/json:
              schema:
                type: "array"
                items:
                  type: "object"
              example:
                - booth_id: "string"
                  booth_name: "string"
                  photo_key: "string|null"
                  photo_url: "string|null"
                  photo_miniature_url: "string|null"
                  localization: "string|null"
                  is_occupied: "boolean"
                  reported_at: "timestamp"
                  is_online: "boolean"
          description: "Returns **200** (OK) as **application/json**"
        500:
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  message: "string"
                  error: "string"
              example:
                message: "string"
                error: "string"
          description: "Returns **500** (Internal Server Error) as **application/json**"
      security: []
    post:
      summary: "Update booth status (updateStatus)"
      description: "Update the occupancy status of a booth. Requires API token authentication via x-api-token header. Stores status as history.\n\n _app/controllers/booth_status_controller.ts_ - **updateStatus**"
      parameters: []
      tags:
        - "BOOTHS"
      responses:
        200:
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  booth_id: "string"
                  booth_name: "string"
                  photo_key: "string|null"
                  photo_url: "string|null"
                  photo_miniature_url: "string|null"
                  localization: "string|null"
                  is_occupied: "boolean"
                  reported_at: "timestamp"
                  is_online: "boolean"
              example:
                booth_id: "string"
                booth_name: "string"
                photo_key: "string|null"
                photo_url: "string|null"
                photo_miniature_url: "string|null"
                localization: "string|null"
                is_occupied: "boolean"
                reported_at: "timestamp"
                is_online: "boolean"
          description: "Returns **200** (OK) as **application/json**"
        400:
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  message: "string"
                  error: "string"
              example:
                message: "string"
                error: "string"
          description: "Returns **400** (Bad Request) as **application/json**"
        401:
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  error: "string"
              example:
                error: "string"
          description: "Returns **401** (Unauthorized) as **application/json**"
        403:
          description: "Returns **403** (Forbidden)"
        404:
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  message: "string"
              example:
                message: "string"
          description: "Returns **404** (Not Found) as **application/json**"
        500:
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  message: "string"
                  error: "string"
              example:
                message: "string"
                error: "string"
          description: "Returns **500** (Internal Server Error) as **application/json**"
      security:
        - ApiKeyAuth:
            - "access"
      requestBody:
        content:
          application/json:
            schema:
              type: "object"
              properties:
                booth_id: "string"
                is_occupied: "boolean"
            example:
              booth_id: "string"
              is_occupied: "boolean"
  /api/v1/booths/status/{boothId}:
    get:
      summary: "Get single booth status (show)"
      description: "Returns **200** (OK) as **application/json**\n\n _app/controllers/booth_status_controller.ts_ - **show**"
      parameters:
        - in: "path"
          name: "boothId"
          description: "Booth identifier"
          schema:
            example: ""
            type: "string"
          required: false
      tags:
        - "BOOTHS"
      responses:
        200:
          content:
            application/json:
              schema:
                type: "object"
                properties:
                  booth_id: "string"
                  booth_name: "string"
                  photo_key: "string|null"
                  photo_url: "string|null"
                  photo_miniature_url: "string|null"
                  localization: "string|null"
                  is_occupied: "boolean|null"
                  reported_at: "timestamp|null"
                  is_online: "boolean"
              example:
                booth_id: "string"
                booth_name: "string"
                photo_key: "string|null"
                photo_url: "string|null"
                photo_miniature_url: "string|null"
                localization: "string|null"
                is_occupied: "boolean|null"
