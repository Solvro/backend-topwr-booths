openapi: "3.0.0"
info:
  title: "Booth Monitor API"
  version: "1.0.0"
  description: "Simple API for monitoring booth occupancy status. Booths send their status every minute via authenticated POST requests. If a booth doesn't send updates for 3 minutes, it's considered offline."
components:
  responses:
    Forbidden:
      description: "Access token is missing or invalid"
    Accepted:
      description: "The request was accepted"
    Created:
      description: "The resource has been created"
    NotFound:
      description: "The resource has been created"
    NotAcceptable:
      description: "The resource has been created"
  securitySchemes:
    BearerAuth:
      type: "http"
      scheme: "bearer"
    BasicAuth:
      type: "http"
      scheme: "basic"
    ApiKeyAuth:
      type: "apiKey"
      in: "header"
      name: "x-api-token"
      description: "API token for booth authentication"
  schemas:
    Any:
      description: "Any JSON object not defined as schema"
    PaginationMeta:
      type: "object"
      properties:
        total:
          type: "number"
          example: 100
          nullable: false
        page:
          type: "number"
          example: 2
          nullable: false
        perPage:
          type: "number"
          example: 10
          nullable: false
        currentPage:
          type: "number"
          example: 3
          nullable: false
        lastPage:
          type: "number"
          example: 10
          nullable: false
        firstPage:
          type: "number"
          example: 1
          nullable: false
        lastPageUrl:
          type: "string"
          example: "/?page=10"
          nullable: false
        firstPageUrl:
          type: "string"
          example: "/?page=1"
          nullable: false
        nextPageUrl:
          type: "string"
          example: "/?page=6"
          nullable: false
        previousPageUrl:
          type: "string"
          example: "/?page=5"
          nullable: false
    ApiToken:
      type: "object"
      required: []
      properties:
        id:
          type: "number"
          example: 584
        name:
          type: "string"
          example: "John Doe"
        hash:
          type: "string"
          example: "Lorem Ipsum"
        created_at:
          type: "string"
          example: "2021-03-23T16:13:08.489+01:00"
          format: "date-time"
        updated_at:
          type: "string"
          example: "2021-03-23T16:13:08.489+01:00"
          format: "date-time"
        last_used_at:
          type: "string"
          example: "2021-03-23T16:13:08.489+01:00"
          format: "date-time"
      description: "ApiToken (Model)"
    Booth:
      type: "object"
      required: []
      properties:
        id:
          type: "number"
          example: 161
        external_id:
          type: "string"
          example: "Lorem Ipsum"
        name:
          type: "string"
          example: "John Doe"
        photo_key:
          type: "string"
          example: "Lorem Ipsum"
        localization:
          type: "string"
          example: "Lorem Ipsum"
        created_at:
          type: "string"
          example: "2021-03-23T16:13:08.489+01:00"
          format: "date-time"
        updated_at:
          type: "string"
          example: "2021-03-23T16:13:08.489+01:00"
          format: "date-time"
        statuses:
          type: "array"
          items:
            $ref: "#/components/schemas/BoothStatus"
            example: null
        photo:
          $ref: "#/components/schemas/FileEntry"
          example: null
      description: "Booth (Model)"
    BoothStatus:
      type: "object"
      required: []
      properties:
        id:
          type: "number"
          example: 566
        booth_id:
          type: "number"
          example: 626
        is_occupied:
          type: "boolean"
          example: true
        reported_at:
          type: "string"
          example: "2021-03-23T16:13:08.489+01:00"
          format: "date-time"
        created_at:
          type: "string"
          example: "2021-03-23T16:13:08.489+01:00"
          format: "date-time"
        updated_at:
          type: "string"
          example: "2021-03-23T16:13:08.489+01:00"
          format: "date-time"
        booth:
          $ref: "#/components/schemas/Booth"
          example: null
      description: "BoothStatus (Model)"
    FileEntry:
      type: "object"
      required: []
      properties:
        id:
          type: "string"
          example: "Lorem Ipsum"
        file_extension:
          type: "string"
          example: "Lorem Ipsum"
        created_at:
          type: "string"
          example: "2021-03-23T16:13:08.489+01:00"
          format: "date-time"
        updated_at:
          type: "string"
          example: "2021-03-23T16:13:08.489+01:00"
          format: "date-time"
        url:
          type: "string"
          example: "https://example.com"
        miniatures_url:
          type: "string"
          example: "Lorem Ipsum"
      description: "FileEntry (Model)"
    User:
      type: "object"
      required: []
      properties:
        id:
          type: "number"
          example: 979
        full_name:
          type: "string"
          example: "John Doe"
        email:
          type: "string"
          example: "johndoe@example.com"
          format: "email"
        created_at:
          type: "string"
          example: "2021-03-23T16:13:08.489+01:00"
          format: "date-time"
        updated_at:
          type: "string"
          example: "2021-03-23T16:13:08.489+01:00"
          format: "date-time"
      description: "User (Model)"
    createBoothValidator:
      type: "object"
      properties:
        booth_id:
          type: "string"
          example: "Lorem Ipsum"
          required: true
          minLength: 1
        booth_name:
          type: "string"
          example: "Lorem Ipsum"
          required: true
          minLength: 1
        photo_key:
          type: "string"
          example: "Lorem Ipsum"
        localization:
          type: "string"
          example: "Lorem Ipsum"
      example:
        booth_id: "Lorem Ipsum"
        booth_name: "Lorem Ipsum"
        photo_key: "Lorem Ipsum"
        localization: "Lorem Ipsum"
      description: "createBoothValidator (Validator)"
    updateBoothStatusValidator:
      type: "object"
      properties:
        booth_id:
          type: "string"
          example: "Lorem Ipsum"
          required: true
          minLength: 1
        is_occupied:
          type: "boolean"
          example: true
          required: true
      example:
        booth_id: "Lorem Ipsum"
        is_occupied: true
      description: "updateBoothStatusValidator (Validator)"
paths:
  /uploads/*:
    get:
      summary: "route"
      description: "\n\n __ - ****"
      parameters: []
      tags: []
      responses:
        200:
          description: "OK"
          content:
            application/json: {}
      security: []
  /uploads/miniatures/*:
    get:
      summary: "route"
      description: "\n\n __ - ****"
